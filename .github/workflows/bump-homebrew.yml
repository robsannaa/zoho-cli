# When you publish a release, open a PR (or push) to update the formula in robsannaa/tap.
# Add secret HOMEBREW_TAP_TOKEN: a PAT with "public_repo" and "workflow" (or "repo") scope.
# Tap maintainers: after merging the bump PR, run "brew update-python-resources zoho-cli"
# in the tap repo so all transitive deps (e.g. idna) are listed in the formula.
name: Bump Homebrew formula

on:
  release:
    types: [published]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Bump Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: robsannaa/tap
          formula: zoho-cli
          no_fork: true
